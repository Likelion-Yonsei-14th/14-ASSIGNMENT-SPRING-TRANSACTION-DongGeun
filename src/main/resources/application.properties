spring.application.name = shop_app

spring.datasource.url=jdbc:mysql://localhost:3306/shop_app?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

jwt.secret = ${JWT_SECRET : shop-app-secret-key-for-jwt-authentication}
jwt.expiration = 3600000s